# Anonymous Signal - National Early-Warning Intelligence Platform
# Privacy-first: No IP logging, no user tracking, no metadata retention

services:

  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: anon_signal_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anon_signal}
      POSTGRES_USER: ${POSTGRES_USER:-anon_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    # PRIVACY: Database is NOT exposed externally
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anon_user} -d ${POSTGRES_DB:-anon_signal}"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s
    networks:
      - internal_net

  # ─── Redis (Rate Limiting & Cache) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: anon_signal_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_changeme}
    expose:
      - "6379"
    networks:
      - internal_net

  # ─── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anon_signal_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-anon_user}:${POSTGRES_PASSWORD:-changeme_in_prod}@postgres:5432/${POSTGRES_DB:-anon_signal}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_changeme}@redis:6379/0
      - AI_SERVICE_URL=http://ai-service:8001
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-generate_32_byte_key_in_prod}
      - JWT_SECRET=${JWT_SECRET:-generate_secret_in_prod}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - CORS_ORIGINS_STR=http://localhost:3000,http://localhost:80
      - MAX_AUDIO_SIZE_MB=${MAX_AUDIO_SIZE_MB:-10}
      - MAX_IMAGE_SIZE_MB=${MAX_IMAGE_SIZE_MB:-5}
      - SCHEDULER_INTERVAL_SECONDS=${SCHEDULER_INTERVAL_SECONDS:-300}
      # PRIVACY: Explicitly disable request logging
      - DISABLE_ACCESS_LOGS=true
      - STORE_IP_ADDRESSES=false
      - STORE_USER_AGENTS=false
    volumes:
      - encrypted_uploads:/app/encrypted_uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal_net
      - public_net
    restart: unless-stopped

  # ─── AI Microservice ───────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: anon_signal_ai
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-anon_user}:${POSTGRES_PASSWORD:-changeme_in_prod}@postgres:5432/${POSTGRES_DB:-anon_signal}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-generate_32_byte_key_in_prod}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - CLASSIFICATION_MODEL=${CLASSIFICATION_MODEL:-facebook/bart-large-mnli}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - UPLOAD_DIR=/app/encrypted_uploads
    volumes:
      - encrypted_uploads:/app/encrypted_uploads:ro
      - ai_model_cache:/root/.cache/huggingface
    # SECURITY: AI service is NOT exposed externally — internal only
    expose:
      - "8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal_net
    restart: unless-stopped
    # AI service needs more memory for ML models
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # ─── Next.js Dashboard ────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: anon_signal_dashboard
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - NODE_ENV=production
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - internal_net
      - public_net
    restart: unless-stopped

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: anon_signal_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - dashboard
    networks:
      - public_net
      - internal_net
    restart: unless-stopped

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  encrypted_uploads:
    driver: local
  ai_model_cache:
    driver: local
  nginx_ssl:
    driver: local
  certbot_www:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  # Internal network — DB, Redis, AI service. Never routed to internet.
  internal_net:
    driver: bridge
    internal: true

  # Public network — only Nginx and Backend are here
  public_net:
    driver: bridge