name: anonymous_signal
description: Anonymous Signal — Privacy-first national reporting platform

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP Client
  http: ^1.2.1
  dio: ^5.4.3

  # Audio Recording
  record: ^5.1.0
  audioplayers: ^6.0.0

  # Image Picker
  image_picker: ^1.0.7

  # State Management
  provider: ^6.1.2

  # Local Storage (for draft reports only — no user data)
  flutter_secure_storage: ^9.0.0

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10
  lottie: ^3.1.0
  shimmer: ^3.0.0

  # Permissions
  permission_handler: ^11.3.0

  # Utilities
  uuid: ^4.3.3
  path_provider: ^2.1.2
  mime: ^1.0.5
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
