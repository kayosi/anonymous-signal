# Anonymous Signal — Nginx Configuration
# Security hardened reverse proxy

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    server_tokens off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    limit_req_zone $server_addr zone=submissions:10m rate=100r/m;
    limit_req_zone $server_addr zone=api:10m rate=500r/m;
    limit_conn_zone $server_addr zone=conn_limit:10m;

    client_max_body_size 20M;
    client_body_buffer_size 1M;
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream dashboard {
        server dashboard:3000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /api/v1/reports/submit {
            limit_req zone=submissions burst=5 nodelay;
            limit_conn conn_limit 10;
            access_log off;
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-Host "";
            proxy_set_header User-Agent "";
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Real-IP "";
            proxy_set_header User-Agent "";
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://backend;
        }

        location / {
            proxy_pass http://dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}