# Anonymous Signal — Nginx Configuration
# Security hardened reverse proxy

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ── Privacy: Disable access logging ──────────────────────────────────
    access_log off;

    # ── Disable server version disclosure ────────────────────────────────
    server_tokens off;
    more_clear_headers Server;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── TLS Configuration ─────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Rate limiting zones (non-IP based for privacy) ────────────────────
    # Uses $server_addr (server's own IP) not $remote_addr (client IP)
    limit_req_zone $server_addr zone=submissions:10m rate=100r/m;
    limit_req_zone $server_addr zone=api:10m rate=500r/m;
    limit_conn_zone $server_addr zone=conn_limit:10m;

    # ── Request size limits ───────────────────────────────────────────────
    client_max_body_size 20M;
    client_body_buffer_size 1M;

    # ── Timeouts ──────────────────────────────────────────────────────────
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Upstream backend ──────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream dashboard {
        server dashboard:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — API Server ────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.anonymous-signal.gov;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ── Block suspicious requests ─────────────────────────────────────
        # Block common scan patterns
        location ~* \.(php|asp|aspx|env|git|svn|htaccess|htpasswd|ini|log|sh|sql|bak)$ {
            return 404;
        }

        # ── Report submission (rate limited) ──────────────────────────────
        location /api/v1/reports/submit {
            limit_req zone=submissions burst=5 nodelay;
            limit_conn conn_limit 10;

            # PRIVACY: Do NOT log this path (contains submission data)
            access_log off;

            # Strip identifying headers before proxying
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-Host "";
            proxy_set_header User-Agent "";

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── General API ───────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            # PRIVACY: Strip identifying headers
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Real-IP "";
            proxy_set_header User-Agent "";

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        # ── Health check (public) ─────────────────────────────────────────
        location /health {
            proxy_pass http://backend;
        }
    }

    # ── HTTPS — Dashboard ─────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name dashboard.anonymous-signal.gov;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Dashboard requires auth — only for internal analyst access
        location / {
            proxy_pass http://dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
